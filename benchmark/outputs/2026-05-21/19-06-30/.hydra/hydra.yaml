hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: 20
    params:
      +fold_id: 0,1,2,3,4
      +cell_line: '''MCF7'',''A549'',''K562'''
      +emb_name: ' ''random'', ''pca'', ''ECFP:2_pkl'', ''LPM_emb'', ''ChemBERTa-77M-MLM'',
        ''ChemBERTa-77M-MTR'', ''avalon'', ''cats2D'', ''cats3D'', ''chatgpt'', ''erg'',
        ''fcfp'', ''maccs'', ''secfp'', ''topological'''
      +estimator_name: '''knn'''
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - +fold_id=0
    - +cell_line=MCF7
    - +emb_name=LPM_emb
    - +estimator_name=knn
    - +lpm_source_path=0521_170ep.pkl
    - +lpm_source_format=pubchem_symbol_lpm_style
    - +lpm_restriction_path=0521_170ep.pkl
    - +lpm_restriction_format=pubchem_symbol_lpm_style
    - +result_label=LPM_emb_0521_170ep
    - +submission_root=benchmark/submissions_sciplex_lfc_0521_compare
  job:
    name: bench_sciplex_lfc_restricted
    chdir: null
    override_dirname: +cell_line=MCF7,+emb_name=LPM_emb,+estimator_name=knn,+fold_id=0,+lpm_restriction_format=pubchem_symbol_lpm_style,+lpm_restriction_path=0521_170ep.pkl,+lpm_source_format=pubchem_symbol_lpm_style,+lpm_source_path=0521_170ep.pkl,+result_label=LPM_emb_0521_170ep,+submission_root=benchmark/submissions_sciplex_lfc_0521_compare
    id: ???
    num: ???
    config_name: config_sciplex_lfc_restricted
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/matthew-mella/valinor/foundation-models-perturbation/benchmark
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/matthew-mella/valinor/foundation-models-perturbation/benchmark/benchmark/benchmark/config/sciplex
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/matthew-mella/valinor/foundation-models-perturbation/benchmark/outputs/2026-05-21/19-06-30
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
