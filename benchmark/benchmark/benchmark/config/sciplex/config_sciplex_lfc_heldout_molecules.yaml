        'morgan_initialized_lpm',
        'random',
        'pca',
        'ChemBERTa-77M-MLM',
        'ChemBERTa-77M-MTR',
        'avalon',
        'cats2D',
        'cats3D',
        'chatgpt',
        'ecfp',
        'erg',
        'fcfp',
        'maccs',
        'secfp',
        'topological'"
      +estimator_name: "'knn','lasso'"
