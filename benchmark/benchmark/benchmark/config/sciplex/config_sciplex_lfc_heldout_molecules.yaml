task_name: "expression/pert-prediction-sciplex3-regression"
lpm_source_path: "lpm_paper10_ft_morgan_learned_fixmol_best_embeddings/sciplex"
lpm_source_format: "lpm_export"
lpm_restriction_path: "lpm_paper10_ft_morgan_learned_fixmol_best_embeddings/sciplex"
